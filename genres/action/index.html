<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   
    <link rel="stylesheet" href="../../src/css/style.css">
    
    <title>XP-Stream |Action</title>
</head>
<body>
    <main>
           <section class="hero-section">
          
            <img id="action-img" src="/public/images/act.jpg" alt="Featured Movie" class="hero-img">

           
            <div class="hero-overlay"></div>

        
            <div class="hero-content">
                <h1>Watch the Best Action Movies on <span>XP-Stream</span></h1>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Search...">
                    <button id="search-btn"><i class="fa-solid fa-search"></i></button>
                </div>
            </div>
        </section>
        <section class="movie-section">
            <h2 class="section-title"><span>Action Adventures</span> </h2>
            <div class="movie-grid" id="action-grid"></div>
        </section>
    </main>

  
<script type="module" src="../../src/js/action.js"></script>
</body>
</html>
